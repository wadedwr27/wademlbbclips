<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WADE MLBB Clips</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a0e1a;
    --navy-2: #0d1526;
    --navy-3: #111c33;
    --navy-4: #162040;
    --navy-5: #1a2850;
    --navy-card: #0f1a30;
    --blue-bright: #1e90ff;
    --blue-glow: #2563eb;
    --blue-light: #60a5fa;
    --blue-muted: #1e3a6e;
    --gold: #f59e0b;
    --gold-light: #fcd34d;
    --text-primary: #e8eaf6;
    --text-secondary: #8ba3c7;
    --text-muted: #4a6080;
    --border: rgba(30, 144, 255, 0.12);
    --border-hover: rgba(30, 144, 255, 0.3);
    --red: #ef4444;
    --green: #22c55e;
    --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-glow: 0 0 20px rgba(30,144,255,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--navy);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy-2); }
  ::-webkit-scrollbar-thumb { background: var(--blue-muted); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--blue-glow); }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(30,144,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,144,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,14,26,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .nav-logo {
    font-size: 1.5rem; font-weight: 700; letter-spacing: 0.08em;
    color: var(--text-primary);
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; cursor: pointer;
  }

  .nav-logo span.accent { color: var(--blue-bright); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }

  .nav-btn {
    font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 6px 16px; border-radius: 4px;
    border: 1px solid var(--border-hover); background: transparent;
    color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
  }

  .nav-btn:hover { background: var(--blue-muted); color: var(--text-primary); border-color: var(--blue-bright); }
  .nav-btn.admin { background: var(--blue-glow); color: #fff; border-color: var(--blue-glow); }
  .nav-btn.admin:hover { background: var(--blue-bright); }

  .hero { padding: 4rem 2rem 3rem; max-width: 1200px; margin: 0 auto; }

  .hero-label {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--blue-bright);
    margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
  }

  .hero-label::before { content: ''; display: inline-block; width: 24px; height: 2px; background: var(--blue-bright); }

  .hero h1 {

  .hero h1 em { font-style: normal; color: var(--blue-bright); }

  .stats-bar { display: flex; gap: 2rem; margin-top: 2rem; flex-wrap: wrap; }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }

  .stat-divider { width: 1px; background: var(--border); align-self: stretch; margin: 4px 0; }

  .search-section {
    max-width: 1200px; margin: 0 auto 2.5rem; padding: 0 2rem;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;

  .search-wrap { flex: 1; min-width: 220px; position: relative; }

  .search-input {
    width: 100%; font-size: 0.9rem; padding: 10px 14px 10px 42px;

  .search-input::placeholder { color: var(--text-muted); }

  .hero-chips { max-width: 1200px; margin: 0 auto 2rem; padding: 0 2rem; display: flex; gap: 8px; flex-wrap: wrap; }

  .hero-chip {
    font-size: 0.78rem; font-weight: 500; padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent; color: var(--text-muted);
    cursor: pointer; transition: all 0.18s; letter-spacing: 0.03em;
  }

  .hero-chip:hover { border-color: var(--border-hover); color: var(--text-secondary); background: rgba(30,144,255,0.06); }
  .hero-chip.active { border-color: var(--gold); color: var(--gold-light); background: rgba(245,158,11,0.1); }

  .clip-grid-wrap { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }

  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }

  .section-title {
    font-size: 1rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-secondary);

  .section-count {

    padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border);

  .clip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

  .clip-card {
    background: var(--navy-card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; transition: all 0.25s; cursor: pointer;
  }

  .clip-card:hover { border-color: var(--border-hover); transform: translateY(-3px); box-shadow: var(--shadow-card), var(--shadow-glow); }

  .clip-thumb { position: relative; aspect-ratio: 16/9; background: var(--navy-3); overflow: hidden; }
  .clip-thumb video { width: 100%; height: 100%; object-fit: cover; }

  .clip-thumb-placeholder {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, var(--navy-3), var(--navy-5));

  .play-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.2s;
  }

  .clip-card:hover .play-overlay { opacity: 1; }

  .play-btn-circle {
    width: 52px; height: 52px; background: rgba(30,144,255,0.9); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }

  .clip-badge {
    position: absolute; top: 8px; left: 8px; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px;
    background: rgba(10,14,26,0.85); border: 1px solid var(--border-hover);
    color: var(--blue-light); backdrop-filter: blur(4px);
  }

  .clip-duration {
    position: absolute; bottom: 8px; right: 8px; font-size: 0.75rem; font-weight: 600;
    padding: 2px 7px; border-radius: 3px; background: rgba(0,0,0,0.75); color: #fff;
  }

  .clip-info { padding: 14px 16px; }

  .clip-hero-tag {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 5px;
  }

  .clip-title { font-size: 1.05rem; font-weight: 600; color: var(--text-primary); line-height: 1.3; margin-bottom: 10px; }
  .clip-meta { display: flex; justify-content: space-between; align-items: center; }
  .clip-tags { display: flex; gap: 5px; flex-wrap: wrap; }

  .clip-tag {
    font-size: 0.68rem; padding: 2px 7px; border-radius: 3px;
    background: rgba(30,144,255,0.08); border: 1px solid rgba(30,144,255,0.15); color: var(--text-secondary);
  }

  .dl-btn {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 5px; border: 1px solid var(--blue-glow);
    background: rgba(30,144,255,0.1); color: var(--blue-light); cursor: pointer;
    transition: all 0.18s; display: flex; align-items: center; gap: 5px; text-decoration: none;
  }

  .dl-btn:hover { background: var(--blue-glow); color: #fff; }

  .empty-state { grid-column: 1 / -1; text-align: center; padding: 5rem 2rem; }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
  .empty-state h3 { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.85rem; color: var(--text-muted); }

  .loading-state { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--blue-bright); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(8px);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 2rem; animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-content {
    background: var(--navy-card); border: 1px solid var(--border-hover); border-radius: 12px;
    width: 100%; max-width: 800px; overflow: hidden; animation: slideUp 0.2s ease;
  }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }

  .modal-title { font-size: 1.15rem; font-weight: 700; }

  .modal-close {
    width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all 0.15s;
  }

  .modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }

  .modal-video {
    width: 100%; aspect-ratio: 16/9; background: #000;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 0.9rem; flex-direction: column; gap: 12px;
  }

  .modal-video video { width: 100%; height: 100%; object-fit: contain; }

  .modal-footer {
    padding: 14px 20px; display: flex; justify-content: space-between; align-items: center;
    gap: 12px; flex-wrap: wrap;
  }

  .modal-info { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* ADMIN */
  .admin-layout { display: flex; min-height: calc(100vh - 64px); }

  .admin-sidebar {
    width: 220px; background: var(--navy-2); border-right: 1px solid var(--border);
    padding: 1.5rem 0; flex-shrink: 0;
  }

  .admin-sidebar-title {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-muted); padding: 0 1.25rem; margin-bottom: 0.75rem;
  }

  .admin-nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 1.25rem;
    font-size: 0.88rem; color: var(--text-secondary); cursor: pointer;
    transition: all 0.15s; border-left: 2px solid transparent; font-weight: 500;
  }

  .admin-nav-item:hover { background: rgba(30,144,255,0.05); color: var(--text-primary); }
  .admin-nav-item.active { background: rgba(30,144,255,0.08); color: var(--blue-light); border-left-color: var(--blue-bright); }

  .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
  .admin-page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
  .admin-page-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem; }

  .admin-metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 2rem; }

  .metric-card { background: var(--navy-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; }
  .metric-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .metric-num { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
  .metric-num span { color: var(--blue-bright); }

  .form-card { background: var(--navy-card); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }

  .form-card h3 {
    font-size: 1rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-secondary); margin-bottom: 1.25rem; padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .form-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 0.78rem; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.04em; }

  .form-input, .form-select, .form-textarea {
    font-size: 0.88rem; padding: 9px 12px; background: var(--navy-3);
    border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }

  .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--blue-bright); box-shadow: 0 0 0 3px rgba(30,144,255,0.1); }
  .form-select option { background: var(--navy-3); color: var(--text-primary); }
  .form-textarea { resize: vertical; min-height: 80px; }

  .btn-primary {
    font-size: 0.85rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 10px 24px; border-radius: 6px; border: none; background: var(--blue-glow);
    color: #fff; cursor: pointer; transition: all 0.18s; font-family: inherit;
  }

  .btn-primary:hover { background: var(--blue-bright); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-danger {
    font-size: 0.78rem; font-weight: 600; padding: 5px 12px; border-radius: 4px;
    border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.08);
    color: #f87171; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }

  .btn-danger:hover { background: var(--red); color: #fff; border-color: var(--red); }

  .admin-table-wrap { background: var(--navy-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

  .admin-table th {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); padding: 12px 16px; text-align: left;
    background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border);
  }

  .admin-table td { padding: 12px 16px; border-bottom: 1px solid rgba(30,144,255,0.06); color: var(--text-secondary); vertical-align: middle; }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: rgba(30,144,255,0.03); color: var(--text-primary); }
  .table-title { color: var(--text-primary); font-weight: 500; }

  .table-badge {
    display: inline-block; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 2px 8px; border-radius: 3px;
    background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); color: var(--gold-light);
  }

  .table-actions { display: flex; gap: 6px; }

  .login-wrap { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 2rem; }

  .login-card { background: var(--navy-card); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; }

  .login-icon {
    width: 52px; height: 52px; background: linear-gradient(135deg, var(--blue-glow), var(--blue-bright));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; margin-bottom: 1.5rem;
  }

  .login-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
  .login-card p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem; }

  .gdrive-box {
    background: linear-gradient(135deg, rgba(30,144,255,0.06), rgba(37,99,235,0.04));
    border: 1px solid rgba(30,144,255,0.25);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .gdrive-box-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.82rem; font-weight: 600; color: var(--blue-light);
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px;
  }

  .gdrive-converted {
    margin-top: 10px; padding: 10px 12px;
    background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25);
    border-radius: 6px; font-size: 0.78rem; color: #86efac;
    word-break: break-all; display: flex; align-items: flex-start; gap: 8px;
  }

  .gdrive-converted span { flex: 1; }

  .gdrive-copy-btn {
    font-size: 0.72rem; font-weight: 600; padding: 3px 9px; border-radius: 4px;
    border: 1px solid rgba(34,197,94,0.3); background: rgba(34,197,94,0.1);
    color: #86efac; cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit;
    flex-shrink: 0;

  .gdrive-copy-btn:hover { background: rgba(34,197,94,0.2); }

  .file-drop {
    border: 2px dashed var(--border-hover); border-radius: 8px; padding: 2rem;
    text-align: center; cursor: pointer; transition: all 0.2s; background: rgba(30,144,255,0.02);
  }

  .file-drop:hover, .file-drop.dragover { border-color: var(--blue-bright); background: rgba(30,144,255,0.06); }
  .file-drop-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.4; }
  .file-drop p { font-size: 0.85rem; color: var(--text-secondary); }
  .file-drop small { font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 4px; }

  .toast {
    position: fixed; bottom: 2rem; right: 2rem; background: var(--navy-card);
    border: 1px solid var(--green); border-radius: 8px; padding: 12px 18px;
    font-size: 0.85rem; color: var(--green); z-index: 500;
    animation: slideIn 0.2s ease; display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .divider-text {
    display: flex; align-items: center; gap: 12px; margin: 14px 0;
    color: var(--text-muted); font-size: 0.78rem;
  }

  .divider-text::before, .divider-text::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .db-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 12px;
    background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #86efac;
  }

  .db-badge.offline {
    background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #fca5a5;
  }

  @media (max-width: 768px) {
    .hero { padding: 2.5rem 1.25rem 2rem; }
    .search-section { padding: 0 1.25rem; }
    .hero-chips { padding: 0 1.25rem; }
    .clip-grid-wrap { padding: 0 1.25rem 3rem; }
    .nav { padding: 0 1.25rem; }
    .admin-sidebar { display: none; }
    .admin-main { padding: 1.25rem; }
    .clip-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── GOOGLE DRIVE HELPERS ─────────────────────────────────────────────────────
function extractGDriveId(input) {
  if (!input) return null;
  const patterns = [
    /drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/,
    /drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/,
    /[?&]id=([a-zA-Z0-9_-]+)/,
  ];
  for (const pattern of patterns) {
    const match = input.match(pattern);
    if (match) return match[1];
  }
  return null;
}

function getGDriveEmbedUrl(url) {
  if (!url) return null;
  const fileId = extractGDriveId(url);
  if (fileId) return `https://drive.google.com/file/d/${fileId}/preview`;
  return null;
}

function isGDriveLink(url) {
  return url && url.includes('drive.google.com');
}

function Toast({ message, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2500);
    return () => clearTimeout(t);
  }, []);
  return <div className="toast"><CheckIcon /> {message}</div>;
}

// ─── GDRIVE CONVERTER ─────────────────────────────────────────────────────────
function GDriveConverter({ onConverted }) {
  const [input, setInput] = useState('');
  const [fileId, setFileId] = useState('');
  const [copied, setCopied] = useState(false);

  const handleConvert = (val) => {
    setInput(val);
    if (!val) { setFileId(''); onConverted(''); return; }
    const id = extractGDriveId(val);
    if (id) {
      setFileId(id);
      onConverted(`https://drive.google.com/uc?export=download&id=${id}`);
    } else if (val.startsWith('http')) {
      setFileId('');
      onConverted(val);
    } else {
      setFileId('');
    }
  };

  const downloadUrl = fileId ? `https://drive.google.com/uc?export=download&id=${fileId}` : '';

  const handleCopy = () => {
    navigator.clipboard.writeText(downloadUrl);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  return (
    <div className="gdrive-box">
      <div className="gdrive-box-title">
        <span>🔗</span> Google Drive Link Converter
      </div>
      <div className="form-group">
        <label className="form-label">Paste your Google Drive share link</label>
        <input
          type="text"
          className="form-input"
          placeholder="https://drive.google.com/file/d/..."
          value={input}
          onChange={e => handleConvert(e.target.value)}
        />
      </div>
      {fileId && (
        <div style={{marginTop:10, display:'flex', flexDirection:'column', gap:6}}>
          <div className="gdrive-converted">
            <span>✓ File ID: {fileId}</span>
          </div>
          <div className="gdrive-converted">
            <span>✓ Download URL ready</span>
            <button className="gdrive-copy-btn" onClick={handleCopy}>
              {copied ? '✓ Copied' : 'Copy'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── VIDEO MODAL ──────────────────────────────────────────────────────────────
function VideoModal({ clip, onClose }) {
  useEffect(() => {
    const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handleKey);
    return () => document.removeEventListener('keydown', handleKey);
  }, []);

  const isDemo = !clip.url;

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-content">
        <div className="modal-header">
          <div>
            <div style={{fontSize:'0.7rem', color:'var(--gold)', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:3}}>
              {clip.hero}
            </div>
            <div className="modal-title">{clip.title}</div>
          </div>
          <button className="modal-close" onClick={onClose}><XIcon /></button>
        </div>

        <div className="modal-video">
          {!isDemo ? (
            isGDriveLink(clip.url) ? (
              <iframe
                src={getGDriveEmbedUrl(clip.url)}
                style={{width:'100%', height:'100%', border:'none'}}
                allow="autoplay"
                allowFullScreen
              />
            ) : (
              <video controls autoPlay style={{width:'100%',height:'100%',objectFit:'contain'}}>
                <source src={clip.url} />
                Your browser does not support this video format.
              </video>
            )
          ) : (
            <>
              <FilmIcon />
              <div style={{textAlign:'center'}}>
                <div style={{color:'var(--text-secondary)', fontSize:'0.9rem'}}>{clip.title}</div>
                <div style={{color:'var(--text-muted)', fontSize:'0.78rem', marginTop:4}}>No video URL attached</div>
              </div>
            </>
          )}
        </div>

        <div className="modal-footer">
          <div className="modal-info">
            {clip.tags?.split(',').filter(Boolean).map(t => (
              <span key={t} className="clip-tag">{t.trim()}</span>
            ))}
            {clip.duration && <span style={{fontSize:'0.78rem', color:'var(--text-muted)'}}>⏱ {clip.duration}</span>}
          </div>
          {!isDemo ? (
            <a href={clip.url} download={clip.title} className="dl-btn" target="_blank" rel="noreferrer">
              <DownloadIcon /> Download
            </a>
          ) : (
            <span className="dl-btn" style={{opacity:0.4, cursor:'default'}}>
              <DownloadIcon /> No File
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── CLIP CARD ────────────────────────────────────────────────────────────────
function ClipCard({ clip, onPlay, onDownload }) {
  const heroColor = HERO_COLORS[clip.hero] || '#2563eb';
  const hasThumb = !!clip.thumb;
  const tagList = clip.tags ? clip.tags.split(',').filter(Boolean) : [];

  return (
    <div className="clip-card" onClick={() => onPlay(clip)}>
      <div className="clip-thumb">
        {hasThumb ? (
          <img
            src={clip.thumb}
            alt={clip.title}
            style={{width:'100%',height:'100%',objectFit:'cover'}}
            onError={e => { e.target.style.display='none'; }}
          />
        ) : (
          <div className="clip-thumb-placeholder" style={{background:`linear-gradient(135deg, ${heroColor}22, var(--navy-5))`}}>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke={heroColor} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{opacity:0.6}}>
              <path d="M15 10l4.553-2.277A1 1 0 0 1 21 8.68V15.32a1 1 0 0 1-1.447.897L15 14M3 8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z"/>
            </svg>
            <span style={{fontSize:'0.72rem', color:heroColor, opacity:0.7, fontWeight:600, letterSpacing:'0.08em'}}>{clip.hero}</span>
          </div>
        )}
        <span className="clip-badge">{clip.hero}</span>
        {clip.duration && <span className="clip-duration">{clip.duration}</span>}
        <div className="play-overlay">
          <div className="play-btn-circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white" stroke="none"><path d="M5 3l14 9-14 9V3z"/></svg>
          </div>
        </div>
      </div>
      <div className="clip-info">
        <div className="clip-hero-tag" style={{color: heroColor}}>{clip.hero}</div>
        <div className="clip-title">{clip.title}</div>
        <div className="clip-meta">
          <div className="clip-tags">
            {tagList.slice(0,2).map(t => <span key={t} className="clip-tag">{t.trim()}</span>)}

            <DownloadIcon /> DL
          </button>
        </div>
      </div>
    </div>
  );
}

  const resetForm = () => {
    setForm({ title:'', hero:'', tags:'', url:'', thumb:'', duration:'' });
    setEditId(null);
  };

  const handleSubmit = async () => {
    if (!form.title || !form.hero) {
      showSwal({ icon:'warning', title:'Missing fields', text:'Title and Hero are required!' });
      return;
    }
    setSaving(true);
    const payload = {
      title: form.title,
      hero: form.hero,
      tags: form.tags,
      url: form.url,
      thumb: form.thumb,
      duration: form.duration,
      date: new Date().toISOString().slice(0,10),
    };

    if (editId !== null) {
      const { error } = await sb.from('clips').update(payload).eq('id', editId);
      if (error) { showSwal({ icon:'error', title:'Error', text: error.message }); }
      else { showToast('Clip updated!'); resetForm(); await fetchClips(); }
    } else {
      const { error } = await sb.from('clips').insert([payload]);
      if (error) { showSwal({ icon:'error', title:'Error', text: error.message }); }
      else { showToast('Clip added to database! 🎉'); resetForm(); await fetchClips(); setPage('clips'); }
    }
    setSaving(false);
  };

  const handleDelete = (id) => {
    Swal.fire({
      title:'Delete Clip?', text:"This removes it from the database permanently.", icon:'warning',
      showCancelButton:true, confirmButtonColor:'#ef4444', cancelButtonColor:'#2563eb',
      confirmButtonText:'Delete', background:'#0f1a30', color:'#e8eaf6'
    }).then(async r => {
      if (r.isConfirmed) {
        const { error } = await sb.from('clips').delete().eq('id', id);
        if (error) showSwal({ icon:'error', title:'Error', text: error.message });
        else { showToast('Clip deleted.'); await fetchClips(); }
      }
    });
  };

  const handleEdit = (clip) => {
    setForm({
      title: clip.title || '',
      hero: clip.hero || '',
      tags: clip.tags || '',
      url: clip.url || '',
      thumb: clip.thumb || '',
      duration: clip.duration || '',
    });
    setEditId(clip.id);
    setPage('upload');
  };

  const navItems = [
    { id:'dashboard', label:'Dashboard', icon:'📈' },
    { id:'upload', label:'Upload Clip', icon:'☁️' },
    { id:'clips', label:'Manage Clips', icon:'🎞️' },
  ];

  return (
    <>
      <nav className="nav">
        <div className="nav-logo" onClick={onBack} style={{cursor:'pointer'}}>
          WADE <span className="accent">MLBB</span>Clips
          <span style={{fontSize:'0.7rem', color:'var(--blue-light)', marginLeft:8, fontWeight:400}}>Admin</span>
        </div>
        <div className="nav-right">
          <span className="db-badge">
            <span style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',display:'inline-block'}}></span>
            Supabase
          </span>
          <button className="nav-btn" onClick={() => {
            Swal.fire({ title:'Go to Gallery?', icon:'question', showCancelButton:true, confirmButtonColor:'#2563eb', cancelButtonColor:'#64748b', confirmButtonText:'Yes', background:'#0f1a30', color:'#e8eaf6' })
            .then(r => { if (r.isConfirmed) onBack(); });
          }}>Gallery</button>
          <button className="nav-btn" onClick={() => {
            Swal.fire({ title:'Logout?', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', cancelButtonColor:'#2563eb', confirmButtonText:'Logout', background:'#0f1a30', color:'#e8eaf6' })
            .then(r => { if (r.isConfirmed) { showToast('Logged out'); setTimeout(onLogout, 800); } });
          }}>Logout</button>
        </div>
      </nav>

      <div className="admin-layout">
        <aside className="admin-sidebar">
          <div className="admin-sidebar-title">Navigation</div>
          {navItems.map(item => (
            <div key={item.id} className={`admin-nav-item ${page === item.id ? 'active' : ''}`} onClick={() => setPage(item.id)}>
              <span>{item.icon}</span> {item.label}
            </div>
          ))}
          <div style={{borderTop:'1px solid var(--border)', margin:'1rem 0'}} />
          <div className="admin-sidebar-title">Library</div>
          <div className="admin-nav-item" onClick={() => setPage('clips')}>
            <span>🎬</span> All Clips ({clips.length})
          </div>
          <div style={{padding:'8px 1.25rem', fontSize:'0.75rem', color:'var(--text-muted)'}}>
            🗄️ Supabase DB
          </div>
        </aside>

        <main className="admin-main">

          {/* DASHBOARD */}
          {page === 'dashboard' && (
            <>
              <div className="admin-page-title">Dashboard</div>
              <div className="admin-page-sub">Your MLBB Clips library — powered by Supabase</div>

              <div className="admin-metrics">
                <div className="metric-card"><div className="metric-label">Total Clips</div><div className="metric-num">{clips.length}<span>+</span></div></div>
                <div className="metric-card"><div className="metric-label">Heroes</div><div className="metric-num">{Array.from(new Set(clips.map(c=>c.hero).filter(Boolean))).length}</div></div>
                <div className="metric-card"><div className="metric-label">Database</div><div className="metric-num" style={{fontSize:'1rem', color:'#86efac', paddingTop:6}}>🟢 Live</div></div>
              </div>

              <div className="form-card">
                <h3>✅ Database Connected</h3>
                <div style={{display:'flex', flexDirection:'column', gap:10, fontSize:'0.85rem', color:'var(--text-secondary)'}}>
                  <div style={{display:'flex', gap:10}}><span style={{color:'var(--green)', fontWeight:700, minWidth:20}}>✓</span><span>Clips are stored in <strong style={{color:'var(--text-primary)'}}>Supabase</strong> — visible to everyone instantly, no redeploy needed</span></div>
                  <div style={{display:'flex', gap:10}}><span style={{color:'var(--green)', fontWeight:700, minWidth:20}}>✓</span><span>Add, edit, or delete clips from the <strong style={{color:'var(--text-primary)'}}>Admin Panel</strong> and they appear live immediately</span></div>
                  <div style={{display:'flex', gap:10}}><span style={{color:'var(--green)', fontWeight:700, minWidth:20}}>✓</span><span>Use <strong style={{color:'var(--text-primary)'}}>Google Drive</strong> links for video hosting — paste the share link and the converter handles the rest</span></div>
                  <div style={{marginTop:4, padding:'8px 12px', background:'rgba(34,197,94,0.08)', border:'1px solid rgba(34,197,94,0.2)', borderRadius:6, fontSize:'0.78rem', color:'#86efac'}}>
                    🚀 Go to <strong>Upload Clip</strong> to add your first clip to the database!
                  </div>
                </div>
              </div>
            </>
          )}

          {/* UPLOAD */}
          {page === 'upload' && (
            <>
              <div className="admin-page-title">{editId ? 'Edit Clip' : 'Upload New Clip'}</div>
              <div className="admin-page-sub">{editId ? 'Modify clip details in the database' : 'Add a new clip — saved directly to Supabase'}</div>

              <div className="form-card">
                <h3>Video Source</h3>
                <GDriveConverter onConverted={handleGDriveConverted} />
                <div className="divider-text">— or drag & drop a local file (preview only) —</div>
                <div
                  className={`file-drop ${dragging ? 'dragover' : ''}`}
                  onClick={() => fileRef.current?.click()}
                  onDragOver={e => { e.preventDefault(); setDragging(true); }}
                  onDragLeave={() => setDragging(false)}
                  onDrop={handleDrop}
                >
                  <div className="file-drop-icon">🎬</div>
                  <p>Drop video file here or click to browse</p>
                  <small>MP4, MOV, WebM (use Google Drive for permanent storage)</small>
                </div>
                <input ref={fileRef} type="file" accept="video/*" style={{display:'none'}} onChange={e => handleFile(e.target.files[0])} />
                {form.url && (
                  <div style={{marginTop:10, padding:'8px 12px', background:'rgba(34,197,94,0.08)', border:'1px solid rgba(34,197,94,0.2)', borderRadius:6, fontSize:'0.78rem', color:'#86efac'}}>
                    ✓ URL: {form.url.slice(0,80)}{form.url.length > 80 ? '...' : ''}
                  </div>
                )}
              </div>

              <div className="form-card">
                <h3>Clip Details</h3>
                <div className="form-row">
                  <div className="form-group" style={{gridColumn:'1/-1'}}>
                    <label className="form-label">Skin Used *</label>
                    <input type="text" className="form-input" placeholder="e.g. Street Punk" value={form.title} onChange={e => setForm(p => ({...p, title:e.target.value}))} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Hero *</label>
                    <select className="form-select" value={form.hero} onChange={e => setForm(p => ({...p, hero:e.target.value}))}>
                      <option value="">Select Hero</option>
                      {HEROES.filter(h => h !== 'All').map(h => <option key={h} value={h}>{h}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Duration</label>
                    <input type="text" className="form-input" placeholder="e.g. 0:15" value={form.duration} onChange={e => setForm(p => ({...p, duration:e.target.value}))} />
                  </div>
                  <div className="form-group" style={{gridColumn:'1/-1'}}>
                    <label className="form-label">Thumbnail Image URL</label>
                    <input
                      type="text"
                      className="form-input"
                      placeholder="https://... (Imgur, Discord CDN, or Google Drive image link)"
                      value={form.thumb}
                      onChange={e => {
                        let val = e.target.value;
                        const thumbId = extractGDriveId(val);
                        if (thumbId) val = `https://lh3.googleusercontent.com/d/${thumbId}`;
                        setForm(p => ({...p, thumb: val}));
                      }}
                    />
                    {form.thumb && (
                      <div style={{marginTop:8, borderRadius:6, overflow:'hidden', border:'1px solid var(--border)', height:100}}>
                        <img src={form.thumb} alt="preview" style={{width:'100%', height:'100%', objectFit:'cover'}} onError={e => e.target.style.display='none'} />
                      </div>
                    )}
                  </div>
                  <div className="form-group" style={{gridColumn:'1/-1'}}>
                    <label className="form-label">IGN (comma separated)</label>
                    <input type="text" className="form-input" placeholder="Player name(s), comma separated" value={form.tags} onChange={e => setForm(p => ({...p, tags:e.target.value}))} />
                  </div>
                </div>
                <div style={{display:'flex', gap:10, marginTop:4}}>
                  <button className="btn-primary" onClick={handleSubmit} disabled={saving}>
                    {saving ? '⏳ Saving...' : editId ? '✓ Save Changes' : '+ Add to Database'}
                  </button>
                  {editId && <button className="nav-btn" onClick={resetForm}>Cancel</button>}
                </div>
              </div>
            </>
          )}

          {/* MANAGE CLIPS */}
          {page === 'clips' && (
            <>
              <div className="admin-page-title">Manage Clips</div>
              <div className="admin-page-sub">{clips.length} clips in Supabase database</div>
              {loading ? (
                <div style={{textAlign:'center', padding:'4rem 2rem'}}>
                  <div className="spinner" style={{margin:'0 auto 1rem'}}></div>
                  <div style={{color:'var(--text-muted)', fontSize:'0.85rem'}}>Loading from database...</div>
                </div>
              ) : clips.length === 0 ? (
                <div style={{textAlign:'center', padding:'4rem 2rem', color:'var(--text-muted)'}}>
                  <div style={{fontSize:'2rem', marginBottom:'1rem'}}>🎬</div>
                  <div>No clips yet. Add one via Upload Clip.</div>
                </div>
              ) : (
                <div className="admin-table-wrap">
                  <table className="admin-table">
                    <thead>
                      <tr>
                        <th>Skin</th><th>Hero</th><th>IGN</th><th>Duration</th><th>Source</th><th>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {clips.map(c => (
                        <tr key={c.id}>
                          <td className="table-title">{c.title}</td>
                          <td><span className="table-badge">{c.hero}</span></td>
                          <td><span style={{fontSize:'0.8rem', color:'var(--text-secondary)'}}>{c.tags || '—'}</span></td>
                          <td>{c.duration || '—'}</td>
                          <td>
                            <span style={{
                              fontSize:'0.7rem', padding:'2px 7px', borderRadius:3,
                              background: c.url?.includes('drive.google') ? 'rgba(34,197,94,0.1)' : 'rgba(96,165,250,0.1)',
                              border: `1px solid ${c.url?.includes('drive.google') ? 'rgba(34,197,94,0.25)' : 'rgba(96,165,250,0.25)'}`,
                              color: c.url?.includes('drive.google') ? '#86efac' : '#93c5fd',
                            }}>
                              {c.url?.includes('drive.google') ? '🔗 GDrive' : c.url ? '🌐 URL' : '❌ None'}
                            </span>
                          </td>
                          <td>
                            <div className="table-actions">
                              <button className="dl-btn" style={{padding:'4px 10px'}} onClick={() => handleEdit(c)}><EditIcon /> Edit</button>
                              <button className="btn-danger" onClick={() => handleDelete(c.id)}><TrashIcon /> Del</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </>
          )}

        </main>
      </div>
    </>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('gallery');
  const [authed, setAuthed] = useState(false);

  const handleAdminClick = () => {
    if (authed) setView('admin');
    else setView('login');
  };

  return (
    <div>
      {view === 'gallery' && <Gallery onAdminClick={handleAdminClick} />}
      {view === 'login' && <Login onLogin={() => { setAuthed(true); setView('admin'); }} />}
      {view === 'admin' && (
        <Admin
          onBack={() => setView('gallery')}
          onLogout={() => { setAuthed(false); setView('gallery'); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
